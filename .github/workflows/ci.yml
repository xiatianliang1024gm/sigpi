name: CI

on:
  push:
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The bash tool defaults to zsh on POSIX platforms; ubuntu-latest does
      # not ship zsh by default, so install it before running the suite.
      - run: sudo apt-get update && sudo apt-get install -y zsh

      - run: pnpm release:check
